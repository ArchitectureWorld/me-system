name: ME-Graph Core

on:
  pull_request:
    paths:
      - "services/me-graph-core/**"
      - "examples/graph/**"
      - ".github/workflows/me-graph-core.yml"
  push:
    branches:
      - main
    paths:
      - "services/me-graph-core/**"
      - "examples/graph/**"
      - ".github/workflows/me-graph-core.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    defaults:
      run:
        working-directory: services/me-graph-core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: services/me-graph-core/pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

      - name: Compile Python sources
        run: python -m compileall -q src
