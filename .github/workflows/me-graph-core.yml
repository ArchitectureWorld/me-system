name: ME-Graph Core

on:
  pull_request:
    paths:
      - "services/me-graph-core/**"
      - "examples/graph/**"
      - "deploy/postgres/**"
      - ".github/workflows/me-graph-core.yml"
  push:
    branches:
      - main
    paths:
      - "services/me-graph-core/**"
      - "examples/graph/**"
      - "deploy/postgres/**"
      - ".github/workflows/me-graph-core.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: me_graph_test
          POSTGRES_USER: me_graph
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U me_graph -d me_graph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    defaults:
      run:
        working-directory: services/me-graph-core

    env:
      ME_GRAPH_TEST_POSTGRES_URL: postgresql+psycopg://me_graph:test-password@127.0.0.1:5432/me_graph_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: services/me-graph-core/pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run tests including PostgreSQL integration
        run: pytest -q

      - name: Compile Python sources
        run: python -m compileall -q src
