name: ME-System root package validation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "schemas/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - "examples/graph/**"
      - "deploy/postgres/**"
      - ".github/workflows/me-system.yml"

permissions:
  contents: read

jobs:
  unit:
    if: github.base_ref == 'validation/me-system-package-base'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - run: pytest -q --tb=short --ignore=tests/test_mcp_stdio.py --ignore=tests/compat/runtime/test_postgres_integration.py
      - run: python -m compileall -q src

  postgres-e2e:
    if: github.base_ref == 'validation/me-system-package-base'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: me_graph_test
          POSTGRES_USER: me_graph
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U me_graph -d me_graph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      ME_GRAPH_TEST_POSTGRES_URL: postgresql+psycopg://me_graph:test-password@127.0.0.1:5432/me_graph_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - run: pytest -q --tb=short tests/compat/runtime/test_postgres_integration.py tests/test_mcp_stdio.py
