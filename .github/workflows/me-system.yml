name: ME-System

on:
  pull_request:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "schemas/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - "examples/**"
      - "deploy/**"
      - ".dockerignore"
      - "体验.*"
      - "停止体验.*"
      - ".github/workflows/me-system.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "schemas/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - "examples/**"
      - "deploy/**"
      - ".dockerignore"
      - "体验.*"
      - "停止体验.*"
      - ".github/workflows/me-system.yml"

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Run unit and contract tests
        id: unit_tests
        shell: bash
        run: |
          set +e
          pytest -q --tb=short \
            --ignore=tests/test_mcp_stdio.py \
            --ignore=tests/compat/runtime/test_postgres_integration.py \
            --ignore=tests/test_ingestion_postgres_e2e.py \
            --ignore=tests/test_experience_postgres_e2e.py \
            > pytest-unit.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 200 pytest-unit.log
          exit 0
      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-unit-${{ matrix.python-version }}
          path: pytest-unit.log
      - name: Fail when unit tests failed
        if: steps.unit_tests.outputs.status != '0'
        run: exit 1
      - run: python -m compileall -q src

  postgres-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: me_graph_test
          POSTGRES_USER: me_graph
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U me_graph -d me_graph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      ME_GRAPH_TEST_POSTGRES_URL: postgresql+psycopg://me_graph:test-password@127.0.0.1:5432/me_graph_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Run PostgreSQL graph, ingestion, one-click experience, and stdio MCP end-to-end tests
        id: e2e_tests
        shell: bash
        run: |
          set +e
          pytest -q --tb=short \
            tests/compat/runtime/test_postgres_integration.py \
            tests/test_ingestion_postgres_e2e.py \
            tests/test_experience_postgres_e2e.py \
            tests/test_mcp_stdio.py \
            > pytest-e2e.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 240 pytest-e2e.log
          exit 0
      - name: Upload end-to-end test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-postgres-e2e
          path: pytest-e2e.log
      - name: Fail when end-to-end tests failed
        if: steps.e2e_tests.outputs.status != '0'
        run: exit 1

  docker-experience:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start novice experience stack
        run: docker compose -f deploy/experience/compose.yml up --build -d
      - name: Wait for dashboard and verify all eight checks
        shell: bash
        run: |
          set -euo pipefail
          ready=0
          for _ in $(seq 1 90); do
            if curl -fsS http://localhost:8765/healthz > health.json; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "Experience dashboard did not become healthy."
            exit 1
          fi
          curl -fsS http://localhost:8765/api/report > experience-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("experience-report.json").read_text())
          assert payload["status"] == "pass", payload
          assert len(payload["checks"]) == 8, payload
          assert all(item["status"] == "pass" for item in payload["checks"]), payload
          assert payload["passed_count"] == 8, payload
          assert payload["failed_count"] == 0, payload
          assert len(payload["technical"]["tool_names"]) == 6, payload
          print(json.dumps({
              "run_id": payload["run_id"],
              "status": payload["status"],
              "passed_count": payload["passed_count"],
          }, ensure_ascii=False))
          PY
      - name: Upload browser acceptance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: one-click-experience-report
          path: |
            health.json
            experience-report.json
          if-no-files-found: warn
      - name: Show experience logs on failure
        if: failure()
        run: docker compose -f deploy/experience/compose.yml logs --tail=240
      - name: Stop and remove isolated experience stack
        if: always()
        run: docker compose -f deploy/experience/compose.yml down --volumes --remove-orphans
