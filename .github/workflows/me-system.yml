name: ME-System

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "schemas/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - "examples/graph/**"
      - "deploy/postgres/**"
      - ".github/workflows/me-system.yml"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Run unit and contract tests
        shell: bash
        run: |
          set -o pipefail
          if ! pytest -q --tb=short \
            --ignore=tests/test_mcp_stdio.py \
            --ignore=tests/compat/runtime/test_postgres_integration.py \
            > /tmp/pytest-unit.log 2>&1; then
            tail -n 160 /tmp/pytest-unit.log
            exit 1
          fi
          cat /tmp/pytest-unit.log
      - run: python -m compileall -q src

  postgres-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: me_graph_test
          POSTGRES_USER: me_graph
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U me_graph -d me_graph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      ME_GRAPH_TEST_POSTGRES_URL: postgresql+psycopg://me_graph:test-password@127.0.0.1:5432/me_graph_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Run PostgreSQL and stdio MCP end-to-end tests
        shell: bash
        run: |
          set -o pipefail
          if ! pytest -q --tb=short \
            tests/compat/runtime/test_postgres_integration.py \
            tests/test_mcp_stdio.py \
            > /tmp/pytest-e2e.log 2>&1; then
            tail -n 160 /tmp/pytest-e2e.log
            exit 1
          fi
          cat /tmp/pytest-e2e.log
