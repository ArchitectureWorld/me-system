name: ME-System

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "services/me-core/**"
      - "src/**"
      - "tests/**"
      - "schemas/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - "scripts/**"
      - "examples/graph/**"
      - "deploy/postgres/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "services/me-core/**"
      - "src/**"
      - "tests/**"
      - "schemas/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - "examples/graph/**"
      - "deploy/postgres/**"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  unified-package-migration:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/unify-me-system-package'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: me_graph_test
          POSTGRES_USER: me_graph
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U me_graph -d me_graph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      ME_GRAPH_TEST_POSTGRES_URL: postgresql+psycopg://me_graph:test-password@127.0.0.1:5432/me_graph_test
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-me-system-package
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply physical package migration when pending
        run: |
          if [ -f scripts/unify_package.py ]; then
            python scripts/unify_package.py
          else
            echo "Package migration is already materialized."
          fi

      - name: Install unified package
        run: python -m pip install -e '.[dev]'

      - name: Run complete tests
        run: pytest -q --tb=short

      - name: Compile sources
        run: python -m compileall -q src

      - name: Verify canonical package and command
        run: |
          python -c 'import me_system; from me_system.adapters.hermes.mcp_server import main; print(me_system.__name__)'
          me-system --help >/dev/null

      - name: Commit migration to feature branch when changed
        run: |
          git config user.name "ArchitectureWorld"
          git config user.email "140295054+ArchitectureWorld@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No migration changes to commit."
            exit 0
          fi
          git commit -m "refactor: unify runtime under me_system package"
          git push origin HEAD:agent/unify-me-system-package

  unit:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/unify-me-system-package'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    defaults:
      run:
        working-directory: services/me-core
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: services/me-core/pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install -q -e '.[dev]'
      - name: Run shared runtime and pure Hermes tests
        run: >-
          pytest -q --tb=short
          --ignore=tests/test_mcp_server.py
          --ignore=tests/test_mcp_stdio.py
          --ignore=tests/test_postgres_integration.py
      - name: Verify FastMCP tool registration
        run: pytest -q --tb=short tests/test_mcp_server.py
      - name: Compile Python sources
        run: python -m compileall -q src

  postgres-e2e:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/unify-me-system-package'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: me_graph_test
          POSTGRES_USER: me_graph
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U me_graph -d me_graph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: services/me-core
    env:
      ME_GRAPH_TEST_POSTGRES_URL: postgresql+psycopg://me_graph:test-password@127.0.0.1:5432/me_graph_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/me-core/pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install -q -e '.[dev]'
      - name: Run PostgreSQL GraphStore integration
        run: pytest -q --tb=short tests/test_postgres_integration.py
      - name: Run stdio MCP PostgreSQL end-to-end test
        run: pytest -q --tb=short tests/test_mcp_stdio.py
