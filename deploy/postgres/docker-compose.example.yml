name: me-system-graph

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ME_GRAPH_POSTGRES_DB}
      POSTGRES_USER: ${ME_GRAPH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ME_GRAPH_POSTGRES_PASSWORD}
    ports:
      - "${ME_GRAPH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - me_graph_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${ME_GRAPH_POSTGRES_USER} -d ${ME_GRAPH_POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  me_graph_postgres:
