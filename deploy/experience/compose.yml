name: me-system-experience

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: me_system_experience
      POSTGRES_USER: me_system
      POSTGRES_PASSWORD: local-experience-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U me_system -d me_system_experience"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - experience-postgres:/var/lib/postgresql/data
    networks:
      - experience

  experience:
    build:
      context: ../..
      dockerfile: deploy/experience/Dockerfile
    environment:
      ME_GRAPH_DATABASE_URL: postgresql+psycopg://me_system:local-experience-only@postgres:5432/me_system_experience
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8765:8765"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz', timeout=3).read()"
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 10s
    networks:
      - experience

volumes:
  experience-postgres:

networks:
  experience:
    driver: bridge
